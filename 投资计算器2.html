<!DOCTYPE html>
<html lang="zh-CN">
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>房产测算</title>
<style>
*{box-sizing:border-box}
body{margin:0;padding:10px;background:#f2f5f9;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;font-size:15px}
.card{background:#fff;border-radius:12px;padding:14px;margin-bottom:10px;box-shadow:0 1px 4px rgba(0,50,100,0.05)}
.title{font-size:16px;font-weight:700;margin-bottom:10px;color:#1f2937}
.item{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid #f3f4f6}
.item:last-child{border-bottom:none}
.input-group{display:flex;align-items:center;gap:6px}
input[type="number"]{width:120px;text-align:right;padding:6px 8px;border:1px solid #e5e7eb;border-radius:8px;background:#f9fafb}
.unit{color:#6b7280;font-size:14px}
.result{color:#2563eb;font-weight:600}

.switch-wrap{display:flex;gap:8px}
.switch-item{flex:1;background:#f9fafb;border-radius:10px;padding:10px;display:flex;align-items:center;justify-content:space-between}
.switch-item span{font-size:13px;color:#374151;font-weight:500}
.switch{position:relative;width:42px;height:24px}
.switch input{opacity:0;width:0;height:0}
.slider{position:absolute;cursor:pointer;top:0;left:0;right:0;bottom:0;background:#d1d5db;border-radius:99px;transition:.2s}
.slider:before{position:absolute;content:"";height:18px;width:18px;left:3px;bottom:3px;background:white;border-radius:50%;transition:.2s}
input:checked + .slider{background:#2563eb}
input:checked + .slider:before{transform:translateX(18px)}
</style>

<div class="card">
  <div class="title">输入参数</div>
  <div class="item">
    <span>房屋总价</span>
    <div class="input-group">
      <input id="p" type="number" value="50">
      <span class="unit">万元</span>
    </div>
  </div>
  <div class="item">
    <span>面积</span>
    <div class="input-group">
      <input id="a" type="number" value="52.25">
      <span class="unit">㎡</span>
    </div>
  </div>
  <div class="item">
    <span>月租金</span>
    <div class="input-group">
      <input id="r" type="number" value="2.8">
      <span class="unit">千元</span>
    </div>
  </div>
  <div class="item">
    <span>装修费</span>
    <div class="input-group">
      <input id="d" type="number" value="7">
      <span class="unit">万元</span>
    </div>
  </div>
</div>

<div class="card">
  <div class="title">是否归结成本</div>
  <div class="switch-wrap">
    <div class="switch-item">
      <span>个税</span>
      <label class="switch"><input type="checkbox" id="useGs" checked><span class="slider"></span></label>
    </div>
    <div class="switch-item">
      <span>契税</span>
      <label class="switch"><input type="checkbox" id="useQs" checked><span class="slider"></span></label>
    </div>
    <div class="switch-item">
      <span>出让金</span>
      <label class="switch"><input type="checkbox" id="useTd" checked><span class="slider"></span></label>
    </div>
  </div>
</div>

<div class="card">
  <div class="title">测算结果</div>

  <!-- 核心收益指标 放最前面 -->
  <div class="item"><span>投资总价</span><span id="total" class="result"></span></div>
  <div class="item"><span>前期现金总投入</span><span id="cash" class="result"></span></div>
  <div class="item"><span>月净盈余</span><span id="net" class="result"></span></div>
  <div class="item"><span>年累计租金</span><span id="yearRent" class="result"></span></div>
  <div class="item"><span>年净现金流</span><span id="yearNet" class="result"></span></div>
  <div class="item"><span>回报率1(年盈余/首投)</span><span id="rate1" class="result"></span></div>
  <div class="item"><span>回报率2(年租金/总价)</span><span id="rate2" class="result"></span></div>

  <!-- 明细指标 放后面 -->
  <div class="item"><span>单价</span><span id="u" class="result"></span></div>
  <div class="item"><span>月供</span><span id="pay" class="result"></span></div>
  <div class="item"><span>佣金</span><span id="yj" class="result"></span></div>
  <div class="item"><span>贷款服务费</span><span id="fwf" class="result"></span></div>
  <div class="item"><span>个税</span><span id="gs" class="result"></span></div>
  <div class="item"><span>契税</span><span id="qs" class="result"></span></div>
  <div class="item"><span>土地出让金</span><span id="td" class="result"></span></div>
</div>

<script>
function fmt(num) {
  const n = Number(num.toFixed(2))
  return n % 1 === 0 ? n.toLocaleString('zh-CN') : n.toLocaleString('zh-CN', { minimumFractionDigits: 2, maximumFractionDigits: 2 })
}

function calc(){
  // 单位自动换算：万元 → 元，千元 → 元
  let p = +document.getElementById('p').value * 10000  // 房屋总价(万元→元)
  let a = +document.getElementById('a').value
  let r = +document.getElementById('r').value * 1000   // 月租金(千元→元)
  let d = +document.getElementById('d').value * 10000  // 装修费(万元→元)

  let useGs = document.getElementById('useGs').checked
  let useQs = document.getElementById('useQs').checked
  let useTd = document.getElementById('useTd').checked

  let rate=0.03/12
  let months=360
  let loan=p*0.85
  let pay=loan*rate*Math.pow(1+rate,months)/(Math.pow(1+rate,months)-1)

  let yj = p*0.03*0.9
  let gs = useGs ? p*0.01 : 0
  let qs = useQs ? p*0.01 : 0
  let td = useTd ? 128*a : 0
  let fwf = 2000
  let fee = yj + gs + qs + td + fwf

  let total = p + fee + d
  let cash = p*0.15 + fee + d
  let net = r - pay
  let yearRent = r*12
  let yearNet = net*12
  let rate1 = cash>0 ? (yearNet/cash*100).toFixed(2) : 0
  let rate2 = total>0 ? (yearRent/total*100).toFixed(2) : 0

  document.getElementById('total').innerText = fmt(total)+' 元'
  document.getElementById('cash').innerText  = fmt(cash)+' 元'
  document.getElementById('net').innerText   = fmt(net)+' 元'
  document.getElementById('yearRent').innerText = fmt(yearRent)+' 元'
  document.getElementById('yearNet').innerText  = fmt(yearNet)+' 元'
  document.getElementById('rate1').innerText  = rate1+'%'
  document.getElementById('rate2').innerText  = rate2+'%'

  document.getElementById('u').innerText    = fmt(p/a)+' 元/㎡'
  document.getElementById('pay').innerText  = fmt(pay)+' 元'
  document.getElementById('yj').innerText   = fmt(yj)+' 元'
  document.getElementById('fwf').innerText  = fmt(fwf)+' 元'
  document.getElementById('gs').innerText   = fmt(gs)+' 元'
  document.getElementById('qs').innerText   = fmt(qs)+' 元'
  document.getElementById('td').innerText   = fmt(td)+' 元'
}

document.querySelectorAll('input').forEach(i=>{
  i.addEventListener('input',calc)
  if(i.type==='checkbox') i.addEventListener('change',calc)
})
calc()
</script>
</html>
